<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600">
  <style> .box{fill:#fff;stroke:#333;stroke-width:2;} .title{font:14px sans-serif;font-weight:bold;} .label{font:12px sans-serif;} .link{stroke:#333;stroke-width:2;} </style>

  <!-- Browser -->
  <rect x="40" y="80" width="260" height="120" class="box"/>
  <text x="80" y="110" class="title">Browser / Client</text>
  <text x="80" y="132" class="label">UI (React)</text>

  <!-- Web Server -->
  <rect x="380" y="60" width="300" height="160" class="box"/>
  <text x="440" y="90" class="title">Web Server</text>
  <text x="440" y="112" class="label">Node.js / Express</text>
  <text x="440" y="132" class="label">REST / GraphQL</text>

  <!-- App / Printer Service -->
  <rect x="740" y="60" width="320" height="160" class="box"/>
  <text x="780" y="90" class="title">Printer Service</text>
  <text x="780" y="112" class="label">Worker / Scheduler</text>
  <text x="780" y="132" class="label">Integrace: OctoPrint / Moonraker</text>

  <!-- Database -->
  <rect x="380" y="260" width="300" height="120" class="box"/>
  <text x="440" y="290" class="title">Database</text>
  <text x="440" y="312" class="label">PostgreSQL</text>

  <!-- Printer Node -->
  <rect x="740" y="260" width="320" height="120" class="box"/>
  <text x="780" y="290" class="title">Printer (OctoPrint)</text>
  <text x="780" y="312" class="label">Raspberry Pi / Firmware</text>

  <!-- Links -->
  <line x1="300" y1="140" x2="380" y2="140" class="link" marker-end="url(#arrow)"/>
  <line x1="680" y1="140" x2="740" y2="140" class="link" marker-end="url(#arrow)"/>
  <line x1="540" y1="220" x2="540" y2="260" class="link" marker-end="url(#arrow)"/>
  <line x1="680" y1="320" x2="740" y2="320" class="link" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#333" />
    </marker>
  </defs>

  <text x="20" y="20" font-size="18" font-weight="bold">Deployment Diagram — PrintTrack</text>
</svg>
