<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOL</title>
</head>
<body>
        <main style="font-family:Arial, sans-serif; padding:20px; max-width:1100px; margin:auto;">
            <h1>PrintTrack — UML diagramy</h1>

            <section>
                <h2>Use-Case Diagram</h2>
                <img src="./diagrams/use_case.svg" alt="Use-Case Diagram" style="width:100%; border:1px solid #ddd;">
            </section>

            <section>
                <h2>Class / ER Diagram</h2>
                <img src="./diagrams/class_er.svg" alt="Class ER Diagram" style="width:100%; border:1px solid #ddd;">
            </section>

            <section>
                <h2>Sequence Diagram — Submit & Complete Job</h2>
                <img src="./diagrams/sequence_print_job.svg" alt="Sequence Diagram" style="width:100%; border:1px solid #ddd;">
            </section>

            <section>
                <h2>Deployment Diagram</h2>
                <img src="./diagrams/deployment.svg" alt="Deployment Diagram" style="width:100%; border:1px solid #ddd;">
            </section>
        </main>
</body>
</html>
